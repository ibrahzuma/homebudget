{% extends 'budget_app/base.html' %}
{% block title %}Delete Project{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card p-4">
    <h4 class="mb-3 text-danger"><i class="bi bi-exclamation-triangle"></i> Delete this project?</h4>
    <p>Removes <strong>{{ project.name }}</strong>. Transactions tagged to it stay, but their project tag is cleared.</p>
    <form method="post">{% csrf_token %}
        <div class="d-flex justify-content-between">
            <a href="{% url 'project_detail' project.pk %}" class="text-muted">Cancel</a>
            <button class="btn btn-danger"><i class="bi bi-trash"></i> Delete</button>
        </div>
    </form>
</div></div></div>
{% endblock %}
